<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ma Learn English">
<meta name="theme-color" content="#dc143c">
<title>Ma Learn English - Lina</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --primary: #dc143c;
  --primary-light: #ffe0e0;
  --primary-dark: #a50021;
  --green: #3B6D11;
  --green-light: #EAF3DE;
  --border: rgba(0,0,0,0.12);
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f1efe8;
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #9a9890;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18;
    --surface: #242422;
    --surface2: #2c2c2a;
    --text: #f1efe8;
    --text2: #b4b2a9;
    --text3: #6b6a66;
    --primary-light: #5a0015;
    --primary: #ff4444;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
.app { display: flex; flex-direction: column; height: 100%; max-width: 680px; margin: 0 auto; }
.main { flex: 1; overflow-y: auto; padding: 12px 14px 80px; -webkit-overflow-scrolling: touch; }
.header { padding: 12px 14px; background: var(--surface); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 600; color: var(--primary); }
.header-actions { display: flex; gap: 8px; margin-top: 8px; }
.icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 10px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; border: none; background: none; }
.nav-item.active { color: var(--primary); }
.section { display: none; }
.section.active { display: block; }

/* SPLASH */
.splash { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
.splash.hidden { display: none; }
.splash-icon { width: 120px; height: 120px; border-radius: 30px; background: white; background-size: cover; background-position: center; margin-bottom: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.splash-word { font-size: 48px; font-weight: 700; color: white; margin-bottom: 20px; cursor: pointer; }
.splash-trans { font-size: 24px; color: rgba(255,255,255,0.8); margin-bottom: 30px; min-height: 32px; display: none; cursor: pointer; }
.splash-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
.splash-btn { padding: 12px 24px; border-radius: 20px; border: none; background: white; color: var(--primary); font-size: 15px; font-weight: 600; cursor: pointer; display: none; }

/* DIALOGUE */
.mode-selector { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
.mode-selector::-webkit-scrollbar { display: none; }
.mode-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text2); white-space: nowrap; font-weight: 500; }
.mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.dial-header { display: flex; gap: 8px; margin-bottom: 12px; }
.lang-btn { padding: 6px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--primary); font-weight: 600; }
.lang-btn.active { background: var(--primary); color: white; }

.dial-messages { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; max-height: 380px; overflow-y: auto; padding: 10px 0; }
.message { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.message.user { align-items: flex-end; }
.message-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
.message.user .message-bubble { background: var(--primary); color: white; border-radius: 18px 18px 4px 18px; }
.message.assistant .message-bubble { background: var(--surface2); color: var(--text); border-radius: 18px 18px 18px 4px; border: 0.5px solid var(--border); cursor: pointer; }
.message-trans { font-size: 12px; color: var(--text3); font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); display: none; }
.sound-btn { background: none; border: none; font-size: 13px; cursor: pointer; margin-top: 4px; }

.dial-input-wrap { display: flex; gap: 8px; padding: 12px; background: var(--surface); border-top: 0.5px solid var(--border); }
.dial-input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface2); font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
.dial-input:focus { border-color: var(--primary); }
.dial-btn { padding: 10px 14px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 14px; cursor: pointer; color: var(--text2); font-weight: 600; }
.dial-btn:disabled { opacity: 0.6; }

/* VOCAB */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.flip-card { perspective: 800px; cursor: pointer; height: 90px; }
.flip-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.38s; }
.flip-card.flipped .flip-inner { transform: rotateY(180deg); }
.flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; border: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; text-align: center; }
.flip-front { background: var(--surface); }
.flip-back { background: var(--primary-light); transform: rotateY(180deg); }
.flip-word { font-size: 13px; font-weight: 600; color: var(--text); }
.flip-trans { font-size: 12px; color: var(--primary); font-weight: 500; }

.add-wrap { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.add-input { padding: 10px 14px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 14px; color: var(--text); outline: none; }
.add-btn { padding: 10px 16px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }

/* QUIZ */
.quiz-card { background: var(--surface); border-radius: 10px; border: 0.5px solid var(--border); padding: 20px; }
.quiz-question { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt { padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 14px; color: var(--text); }
.quiz-opt.correct { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }
.quiz-opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #A32D2D; }

.settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: flex-end; }
.settings-modal.show { display: flex; }
.settings-panel { background: var(--surface); width: 100%; max-width: 400px; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }
.settings-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
.settings-body { flex: 1; padding: 14px; }
.settings-item { margin-bottom: 16px; }
.settings-item label { display: block; font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.settings-item input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface2); font-size: 13px; color: var(--text); outline: none; font-family: monospace; }
.settings-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.settings-info { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.6; }

.empty-state { text-align: center; padding: 30px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 16px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; pointer-events: none; transition: opacity .3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash" class="splash">
  <div style="text-align: center;">
    <div class="splash-icon" id="splash-icon"></div>
    <div class="splash-word" id="splash-en" onclick="speakSplashWord()">English</div>
    <div class="splash-trans" id="splash-fr" onclick="splashShowTrans()"></div>
    <div class="splash-label" id="splash-label">🔊 Appuyer pour écouter</div>
    <button class="splash-btn" id="splash-enter" onclick="enterApp()">Entrer</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-modal" class="settings-modal">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>Paramètres</h2>
      <button style="width:34px;height:34px;border:none;background:var(--surface2);font-size:16px;cursor:pointer;border-radius:8px;" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-item">
        <label>🔑 Clé Groq</label>
        <input type="password" id="groq-key" placeholder="gsk_...">
        <div class="settings-info">Obtenir gratuit sur console.groq.com (30/jour)</div>
      </div>
      <button class="settings-btn" onclick="saveGroqKey()">Sauvegarder</button>
      <button class="settings-btn" style="background:#c0392b;" onclick="resetData()">🗑️ Réinitialiser</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app">
<div class="header">
  <h1>👑 Ma Learn English</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSettings()">⚙️</button>
  </div>
</div>

<div class="main">

<!-- VOCAB SECTION -->
<section id="section-vocab" class="section active">
  <div style="margin-bottom: 12px; font-size: 12px; color: var(--text2);">Mots: <strong id="stat-count">0</strong></div>
  <div style="display: flex; gap: 8px; margin-bottom: 12px;">
    <input type="text" id="search" placeholder="Chercher..." onkeyup="filterVocab()" style="flex: 1; padding: 10px 14px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 14px; color: var(--text); outline: none;">
    <button onclick="resetSearch()" style="padding: 10px 16px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 12px; font-weight: 600; cursor: pointer;">Reset</button>
  </div>
  <div id="vocab-empty" class="empty-state" style="display: none;">
    <div class="empty-icon">📚</div>
    <div>Ajoute tes premiers mots</div>
  </div>
  <div id="vocab-cards" class="cards-grid"></div>
  <div style="margin-top: 20px;">
    <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">Ajouter un mot</h3>
    <div class="add-wrap">
      <input type="text" id="new-word" placeholder="Mot en anglais..." class="add-input">
      <input type="text" id="new-trans" placeholder="Traduction française..." class="add-input">
      <button class="add-btn" onclick="addWord()">+ Ajouter</button>
    </div>
  </div>
</section>

<!-- DIALOGUE SECTION -->
<section id="section-dialogue" class="section">
  <div class="mode-selector" id="modes"></div>
  <div class="dial-header">
    <button class="lang-btn active" id="lang-btn" onclick="toggleLang()" style="color: white; background: var(--primary);">🇬🇧 English</button>
    <button class="lang-btn" id="mic-btn" style="flex: 1; text-align: center;" onclick="toggleMic()">🎤 Parler</button>
  </div>
  <div class="dial-messages" id="dial-messages"></div>
  <div class="dial-input-wrap">
    <textarea id="dial-input" placeholder="Tape ou parle..." rows="2" style="flex: 1; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface2); font-size: 14px; color: var(--text); outline: none; font-family: inherit; resize: none;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDialogue();}"></textarea>
    <button class="dial-btn" id="send-btn" onclick="sendDialogue()" style="padding: 10px 16px; border: none; background: var(--primary); color: white; cursor: pointer; height: 100%; font-weight: 600;">➤</button>
  </div>
</section>

<!-- QUIZ SECTION -->
<section id="section-quiz" class="section">
  <div style="margin-bottom: 12px; font-size: 12px; color: var(--text2);">Justes: <strong id="quiz-correct">0</strong> | Score: <strong id="quiz-score">0%</strong></div>
  <div id="quiz-container"></div>
</section>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchSection('vocab')">
    <div style="font-size: 22px;">📚</div>
    <div>Vocab</div>
  </button>
  <button class="nav-item" onclick="switchSection('dialogue')">
    <div style="font-size: 22px;">💬</div>
    <div>Dialogue</div>
  </button>
  <button class="nav-item" onclick="switchSection('quiz')">
    <div style="font-size: 22px;">❓</div>
    <div>Quiz</div>
  </button>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
const VOCAB = [
  { w: 'vocabulary', t: 'vocabulaire' }, { w: 'pronunciation', t: 'prononciation' }, { w: 'grammar', t: 'grammaire' },
  { w: 'communicate', t: 'communiquer' }, { w: 'understand', t: 'comprendre' }, { w: 'difficult', t: 'difficile' },
  { w: 'interesting', t: 'intéressant' }, { w: 'experience', t: 'expérience' }, { w: 'adventure', t: 'aventure' },
  { w: 'technology', t: 'technologie' }, { w: 'opportunity', t: 'opportunité' }, { w: 'environment', t: 'environnement' },
  { w: 'culture', t: 'culture' }, { w: 'tradition', t: 'tradition' }, { w: 'discover', t: 'découvrir' },
  { w: 'confidence', t: 'confiance' }, { w: 'friendship', t: 'amitié' }, { w: 'challenge', t: 'défi' },
  { w: 'nevertheless', t: 'néanmoins' }, { w: 'pragmatic', t: 'pragmatique' }, { w: 'meticulous', t: 'méticuleux' },
];

const MODES = {
  free: 'Discussion libre',
  restaurant: 'Restaurant',
  meeting: 'Réunion',
  travel: 'Voyage',
  interview: 'Interview',
  shopping: 'Shopping',
  phone: 'Téléphone',
  debate: 'Débat'
};

const STARTERS = {
  free: `Hello! I'm happy to chat with you in English today.`,
  restaurant: `Good evening! Welcome. Can I start you off with something to drink?`,
  meeting: `Good morning. Thanks for joining. Let's get started.`,
  travel: `Welcome to Heathrow. How can I help you today?`,
  interview: `Thank you for coming in. Could you tell me about yourself?`,
  shopping: `Hi there! Are you looking for something specific today?`,
  phone: `Hello, this is Sarah. Am I speaking with the right person?`,
  debate: `I'd love to hear your thoughts on something. What's on your mind?`
};

let dicoData = [], quizStats = { correct: 0, total: 0 }, dialHistory = [], dialMode = 'free', dialLang = 'en', dialMicActive = false, dialAutoListen = false;

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════

function load() {
  dicoData = JSON.parse(localStorage.getItem('lina_dico') || '[]');
  quizStats = JSON.parse(localStorage.getItem('lina_quiz') || '{"correct":0,"total":0}');
  renderVocab();
  initQuiz();
}

function save() {
  localStorage.setItem('lina_dico', JSON.stringify(dicoData));
  localStorage.setItem('lina_quiz', JSON.stringify(quizStats));
}

// ═══════════════════════════════════════════
// SPLASH & AUDIO
// ═══════════════════════════════════════════

function initSplash() {
  const w = VOCAB[Math.floor(Math.random() * VOCAB.length)];
  document.getElementById('splash-icon').style.backgroundImage = 'url(icon192.png)';
  document.getElementById('splash-en').textContent = w.w;
  document.getElementById('splash-fr').textContent = w.t;
  speak(w.w, 'en');
}

function speakSplashWord() {
  const word = document.getElementById('splash-en').textContent;
  speak(word, 'en');
}

function splashShowTrans() {
  const trans = document.getElementById('splash-trans');
  if (trans.style.display === 'none') {
    trans.style.display = 'block';
    document.getElementById('splash-label').textContent = '👇 Appuyer pour entrer';
    document.getElementById('splash-enter').style.display = 'block';
  }
}

function enterApp() {
  document.getElementById('splash').classList.add('hidden');
}

function speak(text, lang, onEnd) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang === 'en' ? 'en-GB' : 'fr-FR';
  utterance.rate = 0.95;
  if (onEnd) utterance.onend = onEnd;
  window.speechSynthesis.speak(utterance);
}

// ═══════════════════════════════════════════
// VOCAB
// ═══════════════════════════════════════════

function renderVocab() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = dicoData.filter(d => d.w.includes(search) || d.t.includes(search));
  const cards = document.getElementById('vocab-cards');
  document.getElementById('stat-count').textContent = dicoData.length;
  if (filtered.length === 0) {
    cards.innerHTML = '';
    document.getElementById('vocab-empty').style.display = dicoData.length === 0 ? 'block' : 'none';
    return;
  }
  document.getElementById('vocab-empty').style.display = 'none';
  cards.innerHTML = filtered.map(d => `
    <div class="flip-card" onclick="this.classList.toggle('flipped')">
      <div class="flip-inner">
        <div class="flip-front"><div class="flip-word">${d.w}</div><div class="flip-trans" style="font-size:10px;margin-top:4px;color:var(--text3);">🔊</div></div>
        <div class="flip-back"><div class="flip-trans">${d.t}</div></div>
      </div>
    </div>
  `).join('');
}

function filterVocab() { renderVocab(); }
function resetSearch() { document.getElementById('search').value = ''; filterVocab(); }
function addWord() {
  const w = document.getElementById('new-word').value.trim().toLowerCase();
  const t = document.getElementById('new-trans').value.trim();
  if (!w || !t || dicoData.some(d => d.w === w)) { showToast('⚠️ Erreur'); return; }
  dicoData.push({ w, t });
  save();
  renderVocab();
  initQuiz();
  document.getElementById('new-word').value = document.getElementById('new-trans').value = '';
  showToast('✅ Mot ajouté');
}

// ═══════════════════════════════════════════
// DIALOGUE
// ═══════════════════════════════════════════

function initDialogue() {
  document.getElementById('modes').innerHTML = Object.entries(MODES).map(([k, v]) => `
    <button class="mode-btn ${k==='free'?'active':''}" onclick="setMode('${k}')">${v}</button>
  `).join('');
  resetDialogue();
}

function setMode(m) {
  dialMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  resetDialogue();
}

function resetDialogue() {
  dialHistory = [];
  dialAutoListen = false;
  window.speechSynthesis.cancel();
  stopMic();
  updateMicBtn('idle');
  document.getElementById('dial-messages').innerHTML = '';
  const starter = STARTERS[dialMode] || STARTERS.free;
  dialHistory.push({ role: 'assistant', content: starter });
  addDialMsg('assistant', starter);
}

function toggleLang() {
  dialLang = dialLang === 'en' ? 'bilingual' : 'en';
  const btn = document.getElementById('lang-btn');
  btn.textContent = dialLang === 'bilingual' ? '🇫🇷 Bilingual' : '🇬🇧 English';
  btn.style.background = dialLang === 'bilingual' ? 'var(--primary)' : 'var(--surface)';
  btn.style.color = dialLang === 'bilingual' ? 'white' : 'var(--primary)';
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Micro non supporté');
    return;
  }
  if (dialAutoListen || dialMicActive) {
    dialAutoListen = false;
    stopMic();
    window.speechSynthesis.cancel();
    updateMicBtn('idle');
  } else {
    dialAutoListen = true;
    startMic();
  }
}

function updateMicBtn(state) {
  const btn = document.getElementById('mic-btn');
  if (state === 'listening') {
    btn.textContent = '🔴 Listening';
    btn.style.background = 'rgba(231,76,60,.1)';
  } else if (state === 'waiting') {
    btn.textContent = '⏳ Thinking';
    btn.style.background = 'rgba(243,156,18,.1)';
  } else {
    btn.textContent = '🎤 Parler';
    btn.style.background = 'var(--surface)';
  }
}

function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SpeechRecognition();
  rec.lang = 'en-GB';
  rec.continuous = false;
  rec.interimResults = true;
  const input = document.getElementById('dial-input');
  rec.onstart = () => { dialMicActive = true; updateMicBtn('listening'); };
  rec.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    input.value = (final || interim).trim();
  };
  rec.onend = () => {
    dialMicActive = false;
    if (input.value.trim()) {
      updateMicBtn('waiting');
      setTimeout(sendDialogue, 200);
    } else if (!dialAutoListen) updateMicBtn('idle');
  };
  rec.onerror = (e) => {
    dialMicActive = false;
    if (e.error !== 'no-speech') showToast('Erreur: ' + e.error);
    else if (dialAutoListen) setTimeout(startMic, 300);
  };
  window.dialRecognition = rec;
  rec.start();
}

function stopMic() {
  if (window.dialRecognition) window.dialRecognition.stop();
}

function addDialMsg(role, text) {
  const box = document.getElementById('dial-messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  if (!isUser) {
    const trans = document.createElement('div');
    trans.className = 'message-trans';
    trans.textContent = '⏳ Traduction…';
    bubble.appendChild(trans);
    bubble.onclick = async () => {
      if (trans.style.display === 'none') {
        trans.style.display = 'block';
      } else {
        if (trans.textContent === '⏳ Traduction…') {
          trans.textContent = await dialTranslate(text);
        }
        trans.style.display = 'none';
      }
    };
    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.textContent = '🔊';
    btn.onclick = (e) => { e.stopPropagation(); speak(text, 'en', () => { if (dialAutoListen) setTimeout(startMic, 400); }); };
    div.appendChild(btn);
    setTimeout(() => { speak(text, 'en', () => { if (dialAutoListen) setTimeout(startMic, 400); }); }, 200);
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function dialTranslate(text) {
  try {
    const key = localStorage.getItem('groq_key') || '';
    if (key) {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model: 'mixtral-8x7b-32768', max_tokens: 150, messages: [{ role: 'user', content: `Translate to French. Reply ONLY with translation:\n"${text}"` }] })
      });
      const d = await r.json();
      const tr = d.choices?.[0]?.message?.content?.trim() || '';
      if (tr) return '🇫🇷 ' + tr;
    }
    const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|fr`);
    const d = await r.json();
    return '🇫🇷 ' + (d.responseData?.translatedText || 'N/A');
  } catch { return '🇫🇷 Erreur'; }
}

async function sendDialogue() {
  const input = document.getElementById('dial-input');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  addDialMsg('user', text);
  dialHistory.push({ role: 'user', content: text });

  try {
    const key = localStorage.getItem('groq_key') || '';
    if (!key) {
      addDialMsg('assistant', '⚠️ Ajoute ta clé Groq dans Paramètres ⚙️');
      btn.disabled = false;
      return;
    }
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'mixtral-8x7b-32768', max_tokens: 300, messages: dialHistory.slice(-10) })
    });
    const d = await r.json();
    const reply = d.choices?.[0]?.message?.content || '…';
    dialHistory.push({ role: 'assistant', content: reply });
    addDialMsg('assistant', reply);
  } catch (e) {
    addDialMsg('assistant', '❌ Erreur réseau');
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════

let quizPool = [];
function initQuiz() {
  quizPool = [...dicoData, ...VOCAB].filter(w => w.w && w.t).sort(() => Math.random() - 0.5);
  if (quizPool.length === 0) {
    document.getElementById('quiz-container').innerHTML = '<div class="empty-state"><div class="empty-icon">❓</div><div>Ajoute des mots</div></div>';
    return;
  }
  showQuiz();
}

let currentQuiz = null;
function showQuiz() {
  if (quizPool.length === 0) {
    document.getElementById('quiz-container').innerHTML = `<div style="text-align:center;padding:30px;"><div style="font-size:48px;margin-bottom:12px;">🎉</div><div style="font-size:16px;font-weight:600;margin-bottom:12px;">Score: ${quizStats.correct}/${quizStats.total}</div><button onclick="initQuiz()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--primary);color:white;font-size:14px;font-weight:600;cursor:pointer;">Recommencer</button></div>`;
    return;
  }
  const idx = Math.floor(Math.random() * quizPool.length);
  const w = quizPool[idx];
  quizPool.splice(idx, 1);
  const opts = [w.t];
  const allTrans = [...dicoData, ...VOCAB].map(d => d.t);
  while (opts.length < 4) {
    const o = allTrans[Math.floor(Math.random() * allTrans.length)];
    if (!opts.includes(o)) opts.push(o);
  }
  opts.sort(() => Math.random() - 0.5);
  currentQuiz = { w: w.w, correct: w.t, opts };
  document.getElementById('quiz-container').innerHTML = `
    <div class="quiz-card">
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px;">Justes: ${quizStats.correct} | ${quizStats.total>0?Math.round(quizStats.correct*100/quizStats.total)+'%':'0%'}</div>
      <div class="quiz-question">Qu'est-ce que "<strong>${currentQuiz.w}</strong>" ?</div>
      <div class="quiz-options">
        ${currentQuiz.opts.map(o => `<button class="quiz-opt" onclick="answerQuiz('${o.replace(/'/g, "\\'")}')">${o}</button>`).join('')}
      </div>
    </div>
  `;
}

function answerQuiz(a) {
  quizStats.total++;
  if (a === currentQuiz.correct) {
    quizStats.correct++;
    showToast('✅');
  } else {
    showToast('❌ Réponse: ' + currentQuiz.correct);
  }
  document.getElementById('quiz-correct').textContent = quizStats.correct;
  document.getElementById('quiz-score').textContent = Math.round(quizStats.correct * 100 / quizStats.total) + '%';
  save();
  setTimeout(showQuiz, 800);
}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════

function switchSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  event.target.closest('.nav-item').classList.add('active');
}

function openSettings() {
  document.getElementById('groq-key').value = localStorage.getItem('groq_key') || '';
  document.getElementById('settings-modal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}

function saveGroqKey() {
  const key = document.getElementById('groq-key').value.trim();
  if (!key.startsWith('gsk_')) { showToast('⚠️ Clé invalide'); return; }
  localStorage.setItem('groq_key', key);
  showToast('✅ Clé sauvegardée');
  closeSettings();
}

function resetData() {
  if (confirm('Réinitialiser TOUT ?')) {
    dicoData = [];
    quizStats = { correct: 0, total: 0 };
    save();
    load();
    showToast('✅ Réinitialisé');
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

load();
initDialogue();
initSplash();
</script>
