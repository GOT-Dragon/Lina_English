<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#dc143c">
<title>Ma Learn English - Lina</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --primary: #dc143c;
  --primary-light: #ffe0e0;
  --primary-dark: #a50021;
  --green: #3B6D11;
  --border: rgba(0,0,0,0.12);
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f1efe8;
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #9a9890;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18;
    --surface: #242422;
    --surface2: #2c2c2a;
    --text: #f1efe8;
    --text2: #b4b2a9;
    --text3: #6b6a66;
    --border: rgba(255,255,255,0.1);
    --primary-light: #5a0015;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

#splash { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 999; opacity: 1; transition: opacity 0.5s; }
#splash.hidden { opacity: 0; }
.splash-icon { width: 110px; height: 110px; border-radius: 24px; object-fit: cover; box-shadow: 0 8px 32px rgba(0,0,0,0.18); margin-bottom: 28px; }
.splash-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 6px; }
.splash-card { background: white; padding: 24px; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); cursor: pointer; max-width: 280px; }
.splash-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
.splash-word { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.splash-trans { font-size: 15px; color: var(--green); font-style: italic; display: none; margin-bottom: 4px; }
.splash-hint { font-size: 12px; color: var(--text3); margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.splash-hint-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.splash-hint-dot.active { background: var(--primary); }
.splash-sound { background: none; border: none; font-size: 20px; cursor: pointer; margin-top: 8px; color: var(--text3); display: none; }
.splash-enter { padding: 12px 24px; border-radius: 20px; border: none; background: white; color: var(--primary); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; display: none; }

.app { display: flex; flex-direction: column; height: 100%; max-width: 680px; margin: 0 auto; }
.main { flex: 1; overflow-y: auto; padding: 12px 14px 80px; -webkit-overflow-scrolling: touch; }
.header { padding: 12px 14px; background: var(--surface); border-bottom: 0.5px solid var(--border); }
.header h1 { font-size: 18px; font-weight: 600; color: var(--primary); }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 10px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; border: none; background: none; }
.nav-item.active { color: var(--primary); }
.section { display: none; }
.section.active { display: block; }

.btn-primary { padding: 8px 16px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 12px; font-weight: 600; cursor: pointer; }
.sub-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
.sub-tab { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text2); font-weight: 500; white-space: nowrap; }
.sub-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

.quiz-card { background: var(--surface); border-radius: 10px; border: 0.5px solid var(--border); padding: 20px; }
.quiz-q { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt { padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 14px; color: var(--text); }
.quiz-opt:hover { background: var(--surface2); }

.msg-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; max-height: 380px; overflow-y: auto; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
.msg.user .msg-bubble { background: var(--primary); color: white; border-radius: 18px 18px 4px 18px; }
.msg.assistant .msg-bubble { background: var(--surface2); color: var(--text); border-radius: 18px 18px 18px 4px; border: 0.5px solid var(--border); }

.form-group { margin-bottom: 10px; }
.form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text); outline: none; font-family: inherit; }
.form-group textarea { min-height: 80px; resize: none; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 16px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="text-align: center;">
    <img class="splash-icon" src="icon192.png" alt="Lina">
    <div class="splash-title">Ma Learn English</div>
    <div style="font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 36px;">Appuyez pour commencer</div>
    <div class="splash-card" onclick="splashTap()">
      <div class="splash-label" id="splash-label">🇬🇧 Appuyez pour révéler</div>
      <div class="splash-word" id="splash-word"></div>
      <button class="splash-sound" id="splash-sound" onclick="event.stopPropagation();splashSpeak()">🔊</button>
      <div class="splash-trans" id="splash-trans"></div>
      <div class="splash-hint">
        <div class="splash-hint-dot active" id="dot1"></div>
        <div class="splash-hint-dot" id="dot2"></div>
        <div class="splash-hint-dot" id="dot3"></div>
      </div>
    </div>
    <button class="splash-enter" id="splash-enter" onclick="enterApp()">Entrer →</button>
  </div>
</div>

<!-- APP -->
<div class="app">
<div class="header">
  <h1>👑 Ma Learn English</h1>
</div>

<div class="main">

<!-- DIALOGUE -->
<section id="section-dialogue" class="section active">
  <div id="dial-msgs" class="msg-box"></div>
  <div style="display: flex; gap: 8px; padding: 12px; background: var(--surface); border-top: 0.5px solid var(--border);">
    <textarea id="dial-input" placeholder="Tape ou parle..." style="flex: 1; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface2); font-size: 14px; color: var(--text); outline: none; font-family: inherit; resize: none; min-height: 40px;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button onclick="sendMsg()" class="btn-primary">➤</button>
  </div>
</section>

<!-- QUIZ -->
<section id="section-quiz" class="section">
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="setQuizLang('en')">🇬🇧 EN → FR</button>
    <button class="sub-tab" onclick="setQuizLang('fr')">🇫🇷 FR → EN</button>
  </div>
  <div style="margin-bottom: 12px; font-size: 12px; color: var(--text2);">Question <strong id="quiz-num">1</strong>/10</div>
  <div id="quiz-box"></div>
</section>

<!-- VOCAB -->
<section id="section-vocab" class="section">
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="goVocabTab('dico')">Mon Dico</button>
    <button class="sub-tab" onclick="goVocabTab('pratique')">Pratique</button>
  </div>

  <!-- DICO -->
  <div id="tab-dico">
    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
      <input type="text" id="dico-search" placeholder="Chercher..." onkeyup="renderDico()" style="flex: 1; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 13px; outline: none;">
      <button class="btn-primary" onclick="toggleDicoForm()">+ Ajouter</button>
    </div>
    <div id="dico-form" style="display: none; background: var(--surface2); padding: 12px; border-radius: 8px; margin-bottom: 12px;">
      <div class="form-group"><input id="new-word" placeholder="Mot en anglais"></div>
      <div class="form-group"><input id="new-trans" placeholder="Traduction"></div>
      <div style="display: flex; gap: 8px;">
        <button class="btn-primary" onclick="addWord()">Ajouter</button>
        <button onclick="toggleDicoForm()" style="flex: 1; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px;">Annuler</button>
      </div>
    </div>
    <div id="dico-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;"></div>
  </div>

  <!-- PRATIQUE -->
  <div id="tab-pratique" style="display: none;">
    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
      <input type="text" id="phrase-search" placeholder="Chercher..." onkeyup="renderPhrases()" style="flex: 1; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); font-size: 13px; outline: none;">
      <button class="btn-primary" onclick="togglePhraseForm()">+ Créer</button>
    </div>
    <div id="phrase-form" style="display: none; background: var(--surface2); padding: 12px; border-radius: 8px; margin-bottom: 12px;">
      <div class="form-group"><input id="phrase-word" placeholder="Mot-clé"></div>
      <div class="form-group"><textarea id="phrase-en" placeholder="Phrase complète en anglais"></textarea></div>
      <div class="form-group"><input id="phrase-fr" placeholder="Traduction (optionnel)"></div>
      <div style="display: flex; gap: 8px;">
        <button class="btn-primary" onclick="addPhrase()">Ajouter</button>
        <button onclick="togglePhraseForm()" style="flex: 1; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px;">Annuler</button>
      </div>
    </div>
    <div id="phrases-grid"></div>
  </div>
</section>

<!-- TRADUCTEUR -->
<section id="section-translator" class="section">
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="setTradMode('en')">🇬🇧 EN → FR</button>
    <button class="sub-tab" onclick="setTradMode('fr')">🇫🇷 FR → EN</button>
  </div>
  <div class="form-group"><textarea id="trad-input" placeholder="Entrez un mot ou une phrase..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();translate();}"></textarea></div>
  <button class="btn-primary" style="width: 100%; margin-bottom: 12px;" onclick="translate()">Traduire</button>
  <div id="trad-result"></div>
</section>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchSection('dialogue')">
    <div style="font-size: 22px;">💬</div>
    <div>Dialogue</div>
  </button>
  <button class="nav-item" onclick="switchSection('quiz')">
    <div style="font-size: 22px;">❓</div>
    <div>Quiz</div>
  </button>
  <button class="nav-item" onclick="switchSection('vocab')">
    <div style="font-size: 22px;">📚</div>
    <div>Vocab</div>
  </button>
  <button class="nav-item" onclick="switchSection('translator')">
    <div style="font-size: 22px;">🌐</div>
    <div>Traducteur</div>
  </button>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
// Quiz de niveau collège (pas les mots simples du vocab par défaut)
const QUIZ_WORDS = [
  { en: 'accommodate', fr: 'accueillir' },
  { en: 'persevere', fr: 'persévérer' },
  { en: 'adequate', fr: 'adéquat' },
  { en: 'meticulous', fr: 'méticuleux' },
  { en: 'resilient', fr: 'résilient' },
  { en: 'complacent', fr: 'complaisant' },
  { en: 'pragmatic', fr: 'pragmatique' },
  { en: 'eloquent', fr: 'éloquent' },
  { en: 'ambiguous', fr: 'ambigu' },
  { en: 'transcendent', fr: 'transcendant' },
  { en: 'ephemeral', fr: 'éphémère' },
  { en: 'ubiquitous', fr: 'omniprésent' },
  { en: 'candid', fr: 'sincère' },
  { en: 'verbose', fr: 'verbeux' },
  { en: 'serendipity', fr: 'sérendipité' },
  { en: 'juxtapose', fr: 'juxtaposer' },
  { en: 'pragmatic', fr: 'réaliste' },
  { en: 'nostalgic', fr: 'nostalgique' },
  { en: 'meager', fr: 'maigre' },
  { en: 'vindicate', fr: 'justifier' }
];

let dicoData = [], phraseData = [];
let dialHistory = [], quizState = { current: 0, correct: 0, lang: 'en', questions: [], answered: false };
let splashStep = 0, splashWord = null;

function load() {
  dicoData = JSON.parse(localStorage.getItem('lina_dico') || '[]');
  phraseData = JSON.parse(localStorage.getItem('lina_phrases') || '[]');
  renderDico();
  renderPhrases();
  initQuiz();
  initSplash();
}

// ═══ SPLASH ═══
function initSplash() {
  const pool = dicoData.length > 0 ? dicoData : QUIZ_WORDS.slice(0, 5);
  const entry = pool[Math.floor(Math.random() * pool.length)];
  splashWord = entry;
  document.getElementById('splash-word').textContent = entry.en;
  splashStep = 0;
  // Parler le mot DIRECTEMENT sans "Hello"
  setTimeout(() => { speak(entry.en, 'en'); document.getElementById('splash-sound').style.display = 'inline-block'; }, 400);
}

function splashSpeak() {
  if (!splashWord) return;
  if (splashStep === 0) speak(splashWord.en, 'en');
  else speak(splashWord.fr, 'fr');
}

function splashTap() {
  if (splashStep === 0) {
    document.getElementById('splash-trans').textContent = splashWord.fr;
    document.getElementById('splash-trans').style.display = 'block';
    document.getElementById('splash-label').textContent = '🇫🇷 Tapez encore pour entrer';
    document.getElementById('dot1').classList.remove('active');
    document.getElementById('dot2').classList.add('active');
    document.getElementById('splash-enter').style.display = 'block';
    splashStep = 1;
  } else {
    enterApp();
  }
}

function enterApp() {
  const splash = document.getElementById('splash');
  splash.classList.add('hidden');
  document.getElementById('dot2').classList.remove('active');
  document.getElementById('dot3').classList.add('active');
  setTimeout(() => { splash.style.display = 'none'; }, 500);
}

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'en' ? 'en-GB' : 'fr-FR';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

// ═══ DIALOGUE ═══
async function sendMsg() {
  const text = document.getElementById('dial-input').value.trim();
  if (!text) return;
  document.getElementById('dial-input').value = '';
  
  const box = document.getElementById('dial-msgs');
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
  box.appendChild(userDiv);
  box.scrollTop = box.scrollHeight;
  
  dialHistory.push({ role: 'user', content: text });
  
  const key = localStorage.getItem('groq_key');
  if (!key) { showToast('⚠️ Ajoute ta clé Groq'); return; }
  
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'mixtral-8x7b-32768',
        max_tokens: 300,
        messages: [{ role: 'system', content: 'You are a friendly English conversation partner. Keep replies 2-4 sentences.' }, ...dialHistory.slice(-10)]
      })
    });
    const d = await r.json();
    const reply = d.choices?.[0]?.message?.content || '...';
    
    const assistDiv = document.createElement('div');
    assistDiv.className = 'msg assistant';
    assistDiv.innerHTML = `<div class="msg-bubble">${reply}</div>`;
    box.appendChild(assistDiv);
    box.scrollTop = box.scrollHeight;
    
    dialHistory.push({ role: 'assistant', content: reply });
    speak(reply, 'en');
  } catch (e) {
    showToast('❌ Erreur');
  }
}

// ═══ QUIZ ═══
function initQuiz() {
  const 10words = QUIZ_WORDS.sort(() => Math.random() - 0.5).slice(0, 10);
  quizState = { current: 0, correct: 0, lang: 'en', questions: 10words, answered: false };
  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizState.current >= 10) {
    document.getElementById('quiz-box').innerHTML = `
      <div class="quiz-card">
        <div style="text-align: center; padding: 20px;">
          <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
          <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">Quiz terminé !</div>
          <div style="font-size: 16px; margin-bottom: 16px;">Score: <strong>${quizState.correct}/10</strong></div>
          <button class="btn-primary" onclick="initQuiz()">Recommencer</button>
        </div>
      </div>
    `;
    return;
  }
  
  const w = quizState.questions[quizState.current];
  const isEnglish = quizState.lang === 'en';
  const question = isEnglish ? w.en : w.fr;
  const correct = isEnglish ? w.fr : w.en;
  
  const otherWords = QUIZ_WORDS.filter(x => x !== w);
  const opts = [correct];
  while (opts.length < 4 && otherWords.length > 0) {
    const other = otherWords.splice(Math.floor(Math.random() * otherWords.length), 1)[0];
    const option = isEnglish ? other.fr : other.en;
    if (!opts.includes(option)) opts.push(option);
  }
  opts.sort(() => Math.random() - 0.5);
  
  document.getElementById('quiz-num').textContent = quizState.current + 1;
  document.getElementById('quiz-box').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q">${isEnglish ? '🇬🇧' : '🇫🇷'} ${question}</div>
      <div class="quiz-opts">${opts.map(o => `<button class="quiz-opt" onclick="answerQuiz('${o.replace(/'/g, "\\'")}')">${o}</button>`).join('')}</div>
    </div>
  `;
}

function answerQuiz(answer) {
  const w = quizState.questions[quizState.current];
  const correct = quizState.lang === 'en' ? w.fr : w.en;
  if (answer === correct) {
    quizState.correct++;
    showToast('✅');
  } else {
    showToast('❌');
  }
  quizState.current++;
  setTimeout(showQuizQuestion, 600);
}

function setQuizLang(lang) {
  quizState.lang = lang;
  quizState.current = 0;
  quizState.correct = 0;
  document.querySelectorAll('#section-quiz .sub-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  showQuizQuestion();
}

// ═══ DICO ═══
function addWord() {
  const w = document.getElementById('new-word').value.trim().toLowerCase();
  const t = document.getElementById('new-trans').value.trim();
  if (!w || !t) { showToast('⚠️ Complétez'); return; }
  dicoData.push({ en: w, fr: t });
  localStorage.setItem('lina_dico', JSON.stringify(dicoData));
  document.getElementById('new-word').value = '';
  document.getElementById('new-trans').value = '';
  toggleDicoForm();
  renderDico();
  showToast('✅ Ajouté');
}

function renderDico() {
  const search = document.getElementById('dico-search').value.toLowerCase();
  const filtered = dicoData.filter(d => d.en.includes(search) || d.fr.includes(search));
  document.getElementById('dico-grid').innerHTML = filtered.map((d, i) => `
    <div style="perspective: 800px; cursor: pointer; height: 100px;" onclick="this.classList.toggle('flipped')" class="dico-card">
      <div style="position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.38s;" class="dico-flip">
        <div style="position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 8px; text-align: center; background: var(--surface);">
          <div style="font-size: 14px; font-weight: 600; color: var(--text);">${d.en}</div>
        </div>
        <div style="position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 8px; text-align: center; background: var(--primary-light); transform: rotateY(180deg);">
          <div style="font-size: 12px; color: var(--primary); font-weight: 500;">${d.fr}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleDicoForm() { document.getElementById('dico-form').style.display = document.getElementById('dico-form').style.display === 'none' ? 'block' : 'none'; }

// ═══ PHRASES ═══
function addPhrase() {
  const w = document.getElementById('phrase-word').value.trim();
  const en = document.getElementById('phrase-en').value.trim();
  const fr = document.getElementById('phrase-fr').value.trim();
  if (!w || !en) { showToast('⚠️ Complétez'); return; }
  phraseData.push({ word: w, en, fr });
  localStorage.setItem('lina_phrases', JSON.stringify(phraseData));
  document.getElementById('phrase-word').value = '';
  document.getElementById('phrase-en').value = '';
  document.getElementById('phrase-fr').value = '';
  togglePhraseForm();
  renderPhrases();
  showToast('✅ Phrase créée');
}

function renderPhrases() {
  const search = document.getElementById('phrase-search').value.toLowerCase();
  const filtered = phraseData.filter(d => d.word.includes(search) || d.en.includes(search));
  document.getElementById('phrases-grid').innerHTML = filtered.map((d, i) => `
    <div style="background: var(--surface); border-radius: 8px; border: 0.5px solid var(--border); padding: 12px; margin-bottom: 10px; cursor: pointer;" onclick="cyclePhrase(this)">
      <div style="font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;">${d.word}</div>
      <div style="font-size: 11px; color: var(--text3);">Appuyez pour révéler</div>
      <div style="display: none; font-size: 13px; color: var(--text); margin-top: 8px; line-height: 1.5;" class="phrase-en">${d.en}</div>
      <div style="display: none; font-size: 13px; color: var(--text2); margin-top: 4px;" class="phrase-fr">${d.fr || '<em>Pas de traduction</em>'}</div>
    </div>
  `).join('');
}

function cyclePhrase(el) {
  const en = el.querySelector('.phrase-en');
  const fr = el.querySelector('.phrase-fr');
  const hint = el.querySelector('[style*="Appuyez"]');
  
  if (fr.style.display !== 'none') {
    en.style.display = 'none';
    fr.style.display = 'none';
    hint.style.display = 'block';
  } else if (en.style.display !== 'none') {
    en.style.display = 'none';
    fr.style.display = 'block';
    hint.style.display = 'none';
  } else {
    en.style.display = 'block';
    fr.style.display = 'none';
    hint.style.display = 'none';
  }
}

function togglePhraseForm() { document.getElementById('phrase-form').style.display = document.getElementById('phrase-form').style.display === 'none' ? 'block' : 'none'; }

function goVocabTab(tab) {
  document.getElementById('tab-dico').style.display = tab === 'dico' ? 'block' : 'none';
  document.getElementById('tab-pratique').style.display = tab === 'pratique' ? 'block' : 'none';
  document.querySelectorAll('#section-vocab .sub-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ═══ TRADUCTEUR ═══
let tradLang = 'en';

async function translate() {
  const text = document.getElementById('trad-input').value.trim();
  if (!text) { showToast('⚠️ Écrivez du texte'); return; }
  
  const srcLang = tradLang;
  const tgtLang = tradLang === 'en' ? 'fr' : 'en';
  
  document.getElementById('trad-result').innerHTML = '<div style="padding: 10px; color: var(--text3);">⏳ Traduction...</div>';
  
  try {
    const key = localStorage.getItem('groq_key');
    let result = '';
    
    if (key) {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({
          model: 'mixtral-8x7b-32768',
          max_tokens: 200,
          messages: [{ role: 'user', content: `Translate to ${tgtLang === 'fr' ? 'French' : 'English'}: "${text}"` }]
        })
      });
      const d = await r.json();
      result = d.choices?.[0]?.message?.content || '';
    }
    
    if (!result) {
      const mmUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcLang}|${tgtLang}`;
      const mmRes = await fetch(mmUrl);
      const mmData = await mmRes.json();
      result = mmData.responseData?.translatedText || 'Erreur';
    }
    
    document.getElementById('trad-result').innerHTML = `<div style="background: var(--primary-light); border-radius: 10px; padding: 16px;"><div style="font-size: 16px; font-weight: 600; color: var(--primary);">${result}</div></div>`;
  } catch {
    document.getElementById('trad-result').innerHTML = '<div style="color:red;">❌ Erreur</div>';
  }
}

function setTradMode(lang) {
  tradLang = lang;
  document.querySelectorAll('#section-translator .sub-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ═══ UI ═══
function switchSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  event.target.closest('.nav-item').classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

load();
</script>
